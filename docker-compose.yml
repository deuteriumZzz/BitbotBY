services:
  redis:
    image: redis:7-alpine
    container_name: bitbot_redis
    restart: unless-stopped
    command: >
      sh -c "redis-server
        $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"
    networks:
      - bitbot_net
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test: >
        sh -c "redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping"
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    container_name: bitbot_bot
    restart: unless-stopped
    command: python run_bot.py
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - PYTHONPATH=/app
      - HEALTH_PORT=8080
    networks:
      - bitbot_net
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: .
    container_name: bitbot_dashboard
    restart: unless-stopped
    command: python dashboard.py
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - PYTHONPATH=/app
    networks:
      - bitbot_net
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  trainer:
    build: .
    container_name: bitbot_trainer
    restart: unless-stopped
    command: >
      sh -c "while true; do
        echo '[trainer] Starting SAC retraining...';
        python reinforcement_learning/train_sac.py;
        echo '[trainer] Done. Sleeping 7 days...';
        sleep 604800;
      done"
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - PYTHONPATH=/app
    networks:
      - bitbot_net
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: bitbot_alertmanager
    restart: unless-stopped
    networks:
      - bitbot_net
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    depends_on:
      dashboard:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: bitbot_prometheus
    restart: unless-stopped
    networks:
      - bitbot_net
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      bot:
        condition: service_healthy
      dashboard:
        condition: service_healthy
      alertmanager:
        condition: service_started

  grafana:
    image: grafana/grafana:10.4.2
    container_name: bitbot_grafana
    restart: unless-stopped
    networks:
      - bitbot_net
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-bitbot}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/bitbot.json
    depends_on:
      - prometheus

networks:
  bitbot_net:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
