[mypy]
python_version = 3.11
ignore_missing_imports = True
no_strict_optional = True
warn_unused_ignores = False
warn_return_any = False

[mypy-ccxt.*]
ignore_missing_imports = True

[mypy-stable_baselines3.*]
ignore_missing_imports = True

[mypy-gymnasium.*]
ignore_missing_imports = True

[mypy-tenacity.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True
