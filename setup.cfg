[flake8]
max-line-length = 88
extend-ignore =
    # black-incompatible whitespace rules
    E203,
    W503,
    # uppercase mock-class variables in tests are fine
    N806,
per-file-ignores =
    # sys.path.insert before imports is intentional
    dashboard.py: E402, E501
    backtest.py: E402
    tests/conftest.py: E402
    tests/test_risk_manager.py: E402
    # test files: long mock paths and patch strings often exceed 88 chars
    tests/*.py: E501
    # verbose module-level docstrings
    run_bot.py: E501
    src/data_loader.py: I001, I005, E501
    # try/except import guard — isort cannot reorder conditional imports
    src/telegram_notifier.py: I001, I005
    # ccxt.async_support sub-module import ordering
    src/bybit_api.py: I001, I005

[isort]
profile = black
