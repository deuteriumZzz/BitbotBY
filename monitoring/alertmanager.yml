global:
  resolve_timeout: 5m

route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: telegram
  routes:
    - matchers:
        - severity = critical
      repeat_interval: 1h
      receiver: telegram

receivers:
  - name: telegram
    webhook_configs:
      - url: "http://dashboard:8080/webhook/alerts"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname]
