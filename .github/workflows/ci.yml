name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install \
            black isort \
            flake8 flake8-isort flake8-return pep8-naming \
            mypy types-redis pytest-cov

      - name: Check formatting with black
        run: black --check src/ tests/ reinforcement_learning/ config.py dashboard.py supervisor.py

      - name: Check imports with isort
        run: isort --check-only --profile black src/ tests/ reinforcement_learning/ config.py dashboard.py supervisor.py

      - name: Lint with flake8
        run: flake8 src/ tests/ reinforcement_learning/ config.py dashboard.py supervisor.py

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Syntax check
        run: |
          python -m py_compile src/*.py
          python -m py_compile reinforcement_learning/*.py
          python -m py_compile dashboard.py supervisor.py backtest.py

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
