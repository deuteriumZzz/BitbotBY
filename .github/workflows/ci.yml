name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install \
            "black==24.10.0" isort \
            flake8 flake8-isort flake8-return pep8-naming \
            mypy types-redis pytest-cov pytest-asyncio

      - name: Check formatting with black
        run: black --check src/ tests/ reinforcement_learning/ config.py dashboard.py supervisor.py

      - name: Check imports with isort
        run: isort --check-only --profile black src/ tests/ reinforcement_learning/ config.py dashboard.py supervisor.py

      - name: Lint with flake8
        run: flake8 src/ tests/ reinforcement_learning/ config.py dashboard.py supervisor.py

      - name: Type check with mypy
        run: mypy src/

      - name: Syntax check
        run: |
          python -m py_compile src/*.py
          python -m py_compile reinforcement_learning/*.py
          python -m py_compile dashboard.py supervisor.py backtest.py

      - name: Run tests with coverage
        run: pytest tests/ --ignore=tests/integration -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=50

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  integration:
    name: Integration tests (Bybit testnet)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' }}
    env:
      BYBIT_TESTNET_API_KEY: ${{ secrets.BYBIT_TESTNET_API_KEY }}
      BYBIT_TESTNET_API_SECRET: ${{ secrets.BYBIT_TESTNET_API_SECRET }}
      PAPER_TRADING: "true"
      TESTNET: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt pytest pytest-asyncio

      - name: Run integration tests
        if: ${{ env.BYBIT_TESTNET_API_KEY != '' }}
        run: pytest tests/integration/ -m integration -v --timeout=60

      - name: Skip (secrets not configured)
        if: ${{ env.BYBIT_TESTNET_API_KEY == '' }}
        run: echo "⚠️ BYBIT_TESTNET_API_KEY not set — integration tests skipped. Add secrets in repo Settings → Secrets."

  backtest-smoke:
    name: Backtest smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Backtest import and structure check
        run: |
          python -c "
          import backtest
          assert callable(backtest.run_strategy), 'run_strategy missing'
          assert callable(backtest.load_data), 'load_data missing'
          assert callable(backtest.aggregate_results), 'aggregate_results missing'
          assert callable(backtest.print_report), 'print_report missing'
          print('backtest.py structure OK')
          "

      - name: Backtest live smoke (BTC/USDT, 1 month, 4h)
        continue-on-error: true
        timeout-minutes: 3
        env:
          BT_SYMBOL: BTC/USDT
          BT_MONTHS: "1"
          BT_TIMEFRAME: 4h
          PAPER_TRADING: "true"
        run: python backtest.py
